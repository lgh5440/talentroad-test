<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --eum-bg-0:#020818;
    --eum-bg-1:#0a1628;
    --eum-bg-2:#0f2040;
    --eum-panel:rgba(15,23,42,.78);
    --eum-panel-strong:rgba(15,23,42,.92);
    --eum-line:rgba(148,163,184,.18);
    --eum-line-strong:rgba(34,211,238,.34);
    --eum-text:#f8fafc;
    --eum-muted:#94a3b8;
    --eum-soft:#cbd5e1;
    --eum-cyan:#22d3ee;
    --eum-blue:#2563eb;
    --eum-violet:#8b5cf6;
    --eum-gold:#f0bc78;
    --eum-orange:#f08c28;
    --eum-danger:#fb7185;
  }
  html, body, #result-card, #result-card *{
    font-family:"Pretendard Variable", Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  html{
    min-height:100%;
    background:var(--eum-bg-0);
  }
  *{box-sizing:border-box}
  *{min-width:0}
  body{
    min-height:100vh;
    min-height:100dvh;
    color:var(--eum-text);
    background:
      radial-gradient(circle at 10% -10%, rgba(34,211,238,.18), transparent 30rem),
      radial-gradient(circle at 90% 0%, rgba(139,92,246,.16), transparent 28rem),
      linear-gradient(135deg, var(--eum-bg-0) 0%, var(--eum-bg-1) 50%, var(--eum-bg-2) 100%) !important;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  body:before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size:44px 44px;
    mask-image:linear-gradient(to bottom, rgba(0,0,0,.75), transparent 78%);
  }
  .brand-mark{
    width:3rem;
    height:3rem;
    border-radius:1rem;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:rgba(240,188,120,.1);
    border:1px solid rgba(240,188,120,.3);
    box-shadow:0 0 24px rgba(240,188,120,.28);
    overflow:hidden;
  }
  .brand-mark img{
    width:2.55rem;
    height:2.55rem;
    object-fit:contain;
    filter:drop-shadow(0 0 10px rgba(240,188,120,.34));
  }
  .brand-kicker{
    color:var(--eum-cyan);
    letter-spacing:.18em;
    font-size:.7rem;
    font-weight:800;
  }
  .glass-panel, #screen-start, #screen-quiz, #result-card{
    background:var(--eum-panel) !important;
    border:1px solid var(--eum-line) !important;
    border-radius:1rem !important;
    box-shadow:0 22px 80px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05) !important;
    backdrop-filter:blur(16px);
  }
  #screen-start{
    position:relative;
    overflow:hidden;
  }
  #screen-start:after{
    content:"";
    position:absolute;
    right:-7rem;
    top:-7rem;
    width:18rem;
    height:18rem;
    border-radius:999px;
    background:radial-gradient(circle, rgba(34,211,238,.22), transparent 66%);
    pointer-events:none;
  }
  #screen-start:before{
    content:"";
    position:absolute;
    right:2rem;
    top:2rem;
    width:13rem;
    height:13rem;
    background:url("assets/eum_logo_cutout.png?v=2026050702") center/contain no-repeat;
    opacity:.08;
    filter:drop-shadow(0 0 28px rgba(240,188,120,.36));
    pointer-events:none;
  }
  #screen-start > div{position:relative; z-index:1}
  .choice label{
    background:rgba(2,8,24,.42) !important;
    border:1px solid var(--eum-line) !important;
    color:var(--eum-soft) !important;
    border-radius:.9rem !important;
    min-height:3.2rem;
    transition:transform .15s ease, border-color .15s ease, background .15s ease, box-shadow .15s ease;
  }
  .choice label:hover{
    transform:translateY(-1px);
    border-color:rgba(34,211,238,.28) !important;
    background:rgba(15,23,42,.9) !important;
  }
  .choice input:checked + label{
    border-color:rgba(34,211,238,.72) !important;
    box-shadow:0 0 0 3px rgba(34,211,238,.16), 0 0 24px rgba(34,211,238,.16) !important;
    background:linear-gradient(90deg, rgba(6,182,212,.2), rgba(37,99,235,.13)) !important;
    color:#fff !important;
  }
  .btn-disabled{opacity:.45; pointer-events:none}
  .btn-primary, #btn-start, #btn-next{
    border:1px solid rgba(34,211,238,.38) !important;
    background:linear-gradient(135deg, #06b6d4, #2563eb) !important;
    color:white !important;
    box-shadow:0 0 24px rgba(6,182,212,.28) !important;
  }
  .btn-secondary, #btn-prev, #btn-download, #btn-retry{
    border:1px solid var(--eum-line) !important;
    background:rgba(255,255,255,.06) !important;
    color:var(--eum-soft) !important;
  }
  .btn-danger, #btn-clear{
    border:1px solid rgba(251,113,133,.36) !important;
    background:rgba(251,113,133,.1) !important;
    color:#fecdd3 !important;
  }
  button{
    transition:transform .15s ease, filter .15s ease, border-color .15s ease, background .15s ease;
  }
  button:hover{filter:brightness(1.08)}
  button:active{transform:scale(.98)}
  header, main, section, .glass-panel{
    max-width:100%;
  }
  header, main{
    width:min(100%,64rem);
  }
  main{
    overflow:hidden;
  }
  h1, h2, h3, h4, h5, p, label, button{
    overflow-wrap:anywhere;
  }
  label, .form-label{color:var(--eum-soft) !important}
  input, select{
    background:rgba(2,8,24,.62) !important;
    border:1px solid var(--eum-line) !important;
    color:var(--eum-text) !important;
    border-radius:.75rem !important;
    min-height:2.75rem;
  }
  input::placeholder{color:#64748b}
  select option{background:#0f172a; color:#f8fafc}
  input:focus, select:focus{
    outline:none !important;
    border-color:rgba(34,211,238,.75) !important;
    box-shadow:0 0 0 3px rgba(34,211,238,.13) !important;
  }
  #progress-bar{
    background:linear-gradient(90deg, var(--eum-cyan), var(--eum-blue)) !important;
    box-shadow:0 0 18px rgba(34,211,238,.3);
  }
  .result-header{
    border-bottom:1px solid var(--eum-line) !important;
    padding-bottom:1.5rem;
    margin-bottom:1.5rem;
  }
  .combo-key-highlight{font-weight:900; color:var(--eum-cyan)}
  #top3 article{
    background:linear-gradient(135deg, rgba(6,182,212,.14), rgba(139,92,246,.13)) !important;
    border:1px solid rgba(34,211,238,.28) !important;
    color:var(--eum-text) !important;
    box-shadow:0 18px 50px rgba(0,0,0,.28) !important;
  }
  #top3 h5, #result-card h3, #result-card h4{color:#fff !important}
  #top3 p, #top3 li, #result-sub-info{color:var(--eum-soft) !important}
  #score-table > div{
    background:rgba(2,8,24,.5) !important;
    border:1px solid var(--eum-line) !important;
    color:var(--eum-soft) !important;
    box-shadow:none !important;
  }
  #score-table b, #score-table .text-violet-800, #score-table .text-violet-600{color:var(--eum-cyan) !important}
  .score-badge{
    background:rgba(34,211,238,.14) !important;
    color:#a5f3fc !important;
    border:1px solid rgba(34,211,238,.26);
  }
  .persona-card{
    display:grid;
    grid-template-columns:minmax(0,1fr) 11rem;
    gap:1.25rem;
    align-items:center;
    margin-top:1.25rem;
    padding:1.25rem;
    border-radius:1rem;
    border:1px solid rgba(240,188,120,.28);
    background:linear-gradient(135deg, rgba(240,188,120,.12), rgba(6,182,212,.08));
  }
  .persona-image{
    width:100%;
    max-height:16rem;
    object-fit:contain;
    filter:drop-shadow(0 18px 28px rgba(0,0,0,.26));
  }
  .persona-label{
    color:#f0bc78;
    font-size:.78rem;
    font-weight:900;
    letter-spacing:.16em;
  }
  .persona-name{
    color:#fff;
    font-size:2rem;
    line-height:1.15;
    font-weight:900;
    margin-top:.35rem;
  }
  .persona-verse{
    display:inline-flex;
    margin-top:.75rem;
    padding:.35rem .65rem;
    border-radius:999px;
    background:rgba(2,8,24,.34);
    border:1px solid rgba(240,188,120,.22);
    color:#fde68a;
    font-size:.82rem;
    font-weight:800;
  }
  .persona-summary{
    color:var(--eum-soft);
    margin-top:.75rem;
    line-height:1.65;
    font-weight:600;
  }
  #result-card.pdf-export{
    width:760px !important;
    max-width:760px !important;
    background:#fff !important;
    color:#172033 !important;
    border:0 !important;
    border-radius:18px !important;
    box-shadow:none !important;
    padding:34px !important;
  }
  #result-card.pdf-export *{
    color:#172033 !important;
  }
  #result-card.pdf-export .result-header{
    border-bottom:2px solid #e5e7eb !important;
    margin-bottom:18px !important;
    padding-bottom:18px !important;
  }
  #result-card.pdf-export #top3 article{
    background:#f8fafc !important;
    border:1px solid #dbeafe !important;
    box-shadow:none !important;
    text-align:left !important;
  }
  #result-card.pdf-export #top3 h5,
  #result-card.pdf-export #result-card h3,
  #result-card.pdf-export h3,
  #result-card.pdf-export h4{
    color:#0f172a !important;
  }
  #result-card.pdf-export .persona-card{
    grid-template-columns:minmax(0,1fr) 150px;
    background:#fff7ed !important;
    border:1px solid #fed7aa !important;
    page-break-inside:avoid;
  }
  #result-card.pdf-export .persona-name{color:#92400e !important}
  #result-card.pdf-export .persona-label{color:#c2410c !important}
  #result-card.pdf-export .persona-verse{
    background:#fffbeb !important;
    border:1px solid #fde68a !important;
    color:#92400e !important;
  }
  #result-card.pdf-export .persona-summary{color:#334155 !important}
  #result-card.pdf-export #score-table > div{
    background:#fff !important;
    border:1px solid #e2e8f0 !important;
  }
  #result-card.pdf-export .score-badge{
    background:#e0f2fe !important;
    color:#0369a1 !important;
    border:1px solid #bae6fd;
  }
  /* PDF 출력 시 인터랙티브 요소 숨김 */
  #result-card.pdf-export #btn-download,
  #result-card.pdf-export #btn-retry,
  #result-card.pdf-export .ext-details > summary::after{
    display:none !important;
  }
  #result-card.pdf-export .ext-details > summary{
    cursor:default !important;
  }

  /* ===== EXTENDED 영역 (Calling/Verse/Role + 접기형) ===== */
  .ext-area{
    margin-top:.4rem;
    font-size:.78rem;
    letter-spacing:.12em;
    color:var(--eum-gold);
    font-weight:700;
    text-transform:uppercase;
  }
  .ext-label{
    font-size:.7rem;
    letter-spacing:.2em;
    color:var(--eum-cyan);
    font-weight:800;
    margin-bottom:.4rem;
    text-transform:uppercase;
  }
  .ext-calling, .ext-verse, .ext-role{
    text-align:left;
    margin-top:1.25rem;
    padding:1rem 1.15rem;
    border-radius:.85rem;
    border:1px solid var(--eum-line-strong);
    background:linear-gradient(135deg, rgba(34,211,238,.06), rgba(139,92,246,.05));
  }
  .ext-calling{
    border:1px solid rgba(240,188,120,.45);
    background:linear-gradient(135deg, rgba(240,188,120,.10), rgba(240,140,40,.05));
  }
  .ext-calling-text{
    font-size:1.05rem;
    line-height:1.65;
    color:var(--eum-gold);
    font-weight:700;
    margin:0;
  }
  .ext-verse-ref{
    font-size:.95rem;
    font-weight:800;
    color:var(--eum-cyan);
    margin-bottom:.35rem;
  }
  .ext-verse-text{
    color:var(--eum-soft);
    line-height:1.6;
    margin:0;
    font-size:.95rem;
  }
  .ext-role-text{
    color:var(--eum-text);
    line-height:1.6;
    margin:0;
    font-weight:600;
  }
  .ext-details{
    margin-top:1rem;
    text-align:left;
    border:1px solid var(--eum-line);
    border-radius:.85rem;
    background:rgba(15,23,42,.45);
    overflow:hidden;
  }
  .ext-details > summary{
    cursor:pointer;
    list-style:none;
    padding:.85rem 1.15rem;
    font-weight:700;
    color:var(--eum-text);
    display:flex;
    align-items:center;
    gap:.5rem;
    user-select:none;
  }
  .ext-details > summary::-webkit-details-marker{display:none}
  .ext-details > summary::after{
    content:"▾";
    margin-left:auto;
    color:var(--eum-cyan);
    transition:transform .2s ease;
    font-size:.9rem;
  }
  .ext-details[open] > summary::after{transform:rotate(-180deg)}
  .ext-summary-icon{font-size:1rem}
  .ext-count{
    font-size:.75rem;
    font-weight:600;
    color:var(--eum-muted);
    margin-left:.35rem;
  }
  .ext-list{
    margin:0;
    padding:.5rem 1.5rem 1rem 2rem;
    color:var(--eum-soft);
    line-height:1.7;
  }
  .ext-list li{margin-top:.25rem}
  .ext-list-ol{list-style:decimal}
  .ext-list:not(.ext-list-ol){list-style:disc}
  .ext-hashtags{
    display:flex;
    flex-wrap:wrap;
    gap:.4rem;
    justify-content:center;
    margin-top:1rem;
  }
  .ext-hashtag{
    display:inline-block;
    padding:.25rem .65rem;
    border-radius:9999px;
    background:rgba(34,211,238,.12);
    border:1px solid rgba(34,211,238,.3);
    color:var(--eum-cyan);
    font-size:.78rem;
    font-weight:700;
  }

  /* PDF 출력 시 EXTENDED 영역 라이트 모드 */
  #result-card.pdf-export .ext-area{color:#a16207 !important}
  #result-card.pdf-export .ext-label{color:#0369a1 !important}
  #result-card.pdf-export .ext-calling,
  #result-card.pdf-export .ext-verse,
  #result-card.pdf-export .ext-role{
    background:#fffbeb !important;
    border:1px solid #fde68a !important;
    page-break-inside:avoid;
  }
  #result-card.pdf-export .ext-verse{
    background:#eff6ff !important;
    border:1px solid #bfdbfe !important;
  }
  #result-card.pdf-export .ext-role{
    background:#f0fdf4 !important;
    border:1px solid #bbf7d0 !important;
  }
  #result-card.pdf-export .ext-calling-text{color:#92400e !important}
  #result-card.pdf-export .ext-verse-ref{color:#1d4ed8 !important}
  #result-card.pdf-export .ext-verse-text{color:#334155 !important}
  #result-card.pdf-export .ext-role-text{color:#0f172a !important}
  #result-card.pdf-export .ext-details{
    background:#fff !important;
    border:1px solid #e2e8f0 !important;
    page-break-inside:avoid;
  }
  #result-card.pdf-export .ext-details > summary{
    color:#0f172a !important;
    background:#f8fafc !important;
    border-bottom:1px solid #e2e8f0;
  }
  #result-card.pdf-export .ext-details > summary::after{color:#0369a1 !important}
  #result-card.pdf-export .ext-list{color:#334155 !important}
  #result-card.pdf-export .ext-count{color:#64748b !important}
  #result-card.pdf-export .ext-hashtag{
    background:#e0f2fe !important;
    color:#0369a1 !important;
    border:1px solid #bae6fd !important;
  }
  @media print{
    body{background:#fff !important; color:#0f172a !important}
    #result-card, #top3 article, #score-table > div{
      background:#fff !important;
      color:#0f172a !important;
      box-shadow:none !important;
    }
    #result-card *{color:#0f172a !important}
  }
  @media (max-width:640px){
    header{
      padding-top:1.35rem !important;
      padding-bottom:1rem !important;
    }
    #screen-start, #screen-quiz, #result-card{
      width:100% !important;
      max-width:100% !important;
      margin-left:auto !important;
      margin-right:auto !important;
      padding:2rem !important;
      border-left-width:0 !important;
      border-right-width:0 !important;
      border-radius:1rem !important;
    }
    main{
      width:100% !important;
      max-width:390px !important;
      padding-left:1rem !important;
      padding-right:1rem !important;
    }
    input, select{
      width:100% !important;
      max-width:100% !important;
    }
    .persona-card{
      grid-template-columns:1fr;
      text-align:center;
    }
    .persona-image{
      max-height:18rem;
      order:-1;
    }
    #screen-start h2{
      font-size:1.85rem !important;
      line-height:1.18 !important;
      letter-spacing:0 !important;
      word-break:break-all;
    }
    #screen-start:before{
      width:9rem;
      height:9rem;
      right:-1.25rem;
      top:1.5rem;
      opacity:.06;
    }
    #screen-start p, #q-title{
      line-height:1.55 !important;
      word-break:break-all;
    }
  }

  /* ===== 이음 패밀리 광고 — 푸터 + 결과 화면 CTA ===== */
  .eum-family{
    background:linear-gradient(150deg,#0d1b3e 0%,#1a1050 50%,#1e3a8a 100%);
    border:1px solid rgba(252,211,77,.25);
    box-shadow:0 8px 28px rgba(13,27,62,.45);
    border-radius:16px;
    padding:18px;
    margin-top:24px;
  }
  .eum-family-title{
    font-weight:900; font-size:15px; margin-bottom:4px;
    background:linear-gradient(135deg,#fef3c7 0%,#fcd34d 50%,#a16207 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
  }
  .eum-family-sub{ font-size:12px; color:rgba(255,255,255,.7); margin-bottom:12px; line-height:1.55; }
  .eum-family-grid{ display:grid; gap:8px; }
  .eum-family-grid.cols-3{ grid-template-columns:repeat(3,1fr); }
  .eum-family-grid.cols-2{ grid-template-columns:repeat(2,1fr); }
  .eum-family-card{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    padding:10px 8px; border-radius:12px; text-decoration:none;
    transition:transform .15s ease;
  }
  .eum-family-card:hover{ transform:scale(1.03); }
  .eum-family-card:active{ transform:scale(.96); }
  .eum-family-card.is-current{ opacity:.45; cursor:default; }
  .eum-family-emoji{ font-size:28px; margin-bottom:4px; line-height:1; font-family:"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji","Twemoji Mozilla",emoji; }
  .eum-family-name{ font-weight:900; font-size:12px; color:#fff; line-height:1.2; }
  .eum-family-tag{ font-size:10.5px; color:rgba(255,255,255,.7); margin-top:4px; line-height:1.35; }
  .eum-family-card.is-current .eum-family-name{ color:rgba(255,255,255,.6); }
  .eum-family-card.is-current .eum-family-tag{ color:rgba(255,255,255,.4); }
  .eum-family-current-badge{
    margin-top:6px; padding:2px 8px; border-radius:999px;
    background:rgba(255,255,255,.08); color:rgba(255,255,255,.6);

/* ===== 상태 관리 ===== */
let state = { i:0, answers:[], rt:[], name:'', gender:'', age:'', region:'' };
let qStart = 0, submitting = false;

/* ===== UI 잠금 함수 ===== */
function lockNav(lock){
  submitting = lock;
  $('#btn-prev').disabled = lock;
  $('#btn-next').disabled = lock;
  document.querySelectorAll('input[type="radio"]').forEach(r=>r.disabled=lock);
}

/* ===== 초기화 ===== */
document.addEventListener('DOMContentLoaded', ()=>{
  const checkConsent = ()=>{
    const hasConsent = $('#consent').checked;
    const hasGender = $('#inp-gender').value;
    const hasAge = $('#inp-age').value;
    $('#btn-start').classList.toggle('btn-disabled', !(hasConsent && hasGender && hasAge));
  };

  $('#consent').addEventListener('change', checkConsent);
  $('#inp-gender').addEventListener('change', checkConsent);
  $('#inp-age').addEventListener('change', checkConsent);

  $('#btn-start').addEventListener('click', ()=>{
    if($('#btn-start').classList.contains('btn-disabled')) return;
    state.name = $('#inp-name').value.trim();
    state.gender = $('#inp-gender').value;
    state.age = $('#inp-age').value;
    state.region = $('#inp-region').value;
    state.answers = new Array(QUESTIONS.length).fill(null);
    state.rt = new Array(QUESTIONS.length).fill(0);
    state.i = 0;
    showQuiz();
  });



  $('#btn-clear').addEventListener('click', ()=>location.reload());
  $('#btn-prev').addEventListener('click', prev);
  $('#btn-next').addEventListener('click', next);
  $('#btn-retry').addEventListener('click', ()=>location.reload());
  $('#btn-download').addEventListener('click', async ()=>{
    const target = $('#result-card');
    target.classList.add('pdf-export');

    /* PDF 출력 직전: 모든 details 강제 펼침 (원래 상태 저장 후 복원) */
    const detailsList = [...target.querySelectorAll('details')];
    const wasOpen = detailsList.map(d => d.open);
    detailsList.forEach(d => { d.open = true; });

    await Promise.all([...target.querySelectorAll('img')].map(img => (
      img.complete ? Promise.resolve() : new Promise(resolve => {
        img.onload = resolve;
        img.onerror = resolve;
      })
    )));
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
    const opt = {
      margin:8,
      filename:`달란트로드_결과_${Date.now()}.pdf`,
      image:{type:'jpeg',quality:0.98},
      html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff'},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
      pagebreak:{mode:['avoid-all','css','legacy']}
    };
    try {
      await html2pdf().from(target).set(opt).save();
    } finally {
      target.classList.remove('pdf-export');
      detailsList.forEach((d, i) => { d.open = wasOpen[i]; });
    }
  });
});

/* ===== 화면 전환 ===== */
function showQuiz(){
  $('#screen-start').classList.add('hidden');
  $('#screen-quiz').classList.remove('hidden');
  $('#screen-result').classList.add('hidden');
  renderQuestion();
}
function showResult(){
  $('#screen-start').classList.add('hidden');
  $('#screen-quiz').classList.add('hidden');
  $('#screen-result').classList.remove('hidden');
  renderResult();
}

/* ===== 문항 렌더 ===== */
function renderQuestion(){
  const i = state.i, q = QUESTIONS[i];
  $('#q-title').textContent = `Q${i+1}. ${q}`;
  const wrap = $('#choices'); wrap.innerHTML = '';

  SCALE_LABELS.forEach((txt, idx)=>{
    const val = idx+1, id = `q${i}_v${val}`;
    const checked = state.answers[i]===val ? 'checked' : '';
    wrap.insertAdjacentHTML('beforeend', `
      <div class="choice">
        <input class="peer hidden" type="radio" id="${id}" name="q${i}" value="${val}" ${checked}/>
        <label for="${id}" class="block rounded-xl p-3 cursor-pointer transition duration-150">
          <span class="font-medium">${txt}</span>
        </label>
      </div>`);
  });

  const isLast = (i === QUESTIONS.length - 1);
  $('#btn-next').textContent = '제출';
  // 1~59번: '다음' 버튼 숨김 (답 클릭 시 자동 진행) / 60번: '제출' 버튼 노출
  $('#btn-next').classList.toggle('hidden', !isLast);
  $('#btn-prev').disabled = (i===0);
  toggleNextBtn(!!state.answers[i]);

  document.querySelectorAll(`input[name="q${i}"]`).forEach(r=>{
    r.addEventListener('change', ()=>{
      state.answers[i] = Number(r.value);
      toggleNextBtn(true);
      // 마지막 문항이 아니면 약 220ms 후 자동 진행
      // (선택됨 시각 피드백을 잠깐 보여준 뒤 넘김)
      if(!isLast){
        setTimeout(()=>{
          // 사용자가 그 사이 '이전' 버튼을 눌렀거나 제출 중이면 중단
          if(state.i === i && !submitting) next();
        }, 220);
      }
    });
  });

  const totalQuestions = QUESTIONS.length;
  const currentQ = i + 1;
  const pct = Math.round((currentQ)/totalQuestions*100);
  $('#progress-text').textContent = `${currentQ} / ${totalQuestions} (${pct}%)`;
  $('#progress-bar').style.width = `${pct}%`;

  qStart = performance.now();
}
function toggleNextBtn(enabled){ $('#btn-next').classList.toggle('btn-disabled', !enabled); }

/* ===== 점수 계산 (역문항 처리 포함) ===== */
function calcScores(){
  const sums = {L:0,C:0,S:0,W:0,T:0,M:0,P:0,R:0};
  const counts = {L:0,C:0,S:0,W:0,T:0,M:0,P:0,R:0};
  Object.keys(MAP).forEach(k=>{
    MAP[k].forEach(n=>{
      let a = state.answers[n-1];
      if(a!=null){
        if(REVERSE.has(n)) a = 6 - a;
        sums[k]+=a; counts[k]++;
      }
    });
  });
  return Object.keys(sums).map(k=>{
    const type = TYPES.find(t=>t.key===k);
    const avg = counts[k] ? sums[k]/counts[k] : 0;
    return { key:k, name:type.name, sum:sums[k], n:counts[k], avg, norm: Math.round((avg-1)/4*100) };
  }).sort((a,b)=>b.norm-a.norm);
}

/* ===== 조합키 정렬 & 이름 ===== */
function toComboKey(a,b,c){
  const order = ['C','L','M','P','R','S','T','W'];
  return [a,b,c].sort((x,y)=>order.indexOf(x)-order.indexOf(y)).join('+');
}
function typeNameByKey(k){ return (TYPES.find(t=>t.key===k)||{}).name || k; }

/* ===== 결과 렌더 ===== */
function renderResult(){
  const scores = calcScores();
  const top3 = scores.slice(0,3);

  const comboKey = toComboKey(top3[0].key, top3[1].key, top3[2].key);
  const combo = COMBO[comboKey] || {title:`${comboKey} 조합`, desc:'세 은사가 조화를 이루어 공동체에 독특한 기여를 기대할 수 있습니다.', examples:['조합에 대한 상세 설명이 준비되지 않았습니다.','다른 조합 결과는 연구 중입니다.','본 결과는 참고용이며, 다른 조합도 테스트해 보세요.','말씀과 기도로 분별하시길 권장합니다.',' ']} ;
  const persona = PERSONAS[comboKey];

  const nameDisplay = state.name ? state.name + ' 님' : '응답자 님';
  $('#result-sub-info').innerHTML = `${nameDisplay} (${state.gender}, ${state.age})`;

  const ext = (typeof EXTENDED !== 'undefined' && EXTENDED[comboKey]) ? EXTENDED[comboKey] : null;

  const ministryItems = (ext && ext.ministry && ext.ministry.length) ? ext.ministry : combo.examples;
  const examplesList = ministryItems.map(ex => `<li class="mt-2">${ex}</li>`).join('');

  const personaBlock = persona ? `
    <section class="persona-card">
      <div>
        <div class="persona-label">BIBLICAL PERSONA</div>
        <h5 class="persona-name">${persona.person}</h5>
        <div class="persona-verse">${persona.verse}</div>
        <p class="persona-summary">${persona.summary}</p>
      </div>
      <img class="persona-image" src="${persona.image}" alt="${persona.person} 성경 인물 이미지" loading="eager" />
    </section>
  ` : '';

  const callingBlock = (ext && ext.calling) ? `
    <section class="ext-calling">
      <div class="ext-label">💡 CALLING MESSAGE</div>
      <p class="ext-calling-text">“${ext.calling}”</p>
    </section>` : '';

  const verseBlock = (ext && ext.verseRef) ? `
    <section class="ext-verse">
      <div class="ext-label">📖 KEY VERSE</div>
      <div class="ext-verse-ref">${ext.verseRef}</div>
      ${ext.verseText ? `<p class="ext-verse-text">“${ext.verseText}”</p>` : ''}
    </section>` : '';

  const roleBlock = (ext && ext.role) ? `
    <section class="ext-role">
      <div class="ext-label">🎯 핵심 역할</div>
      <p class="ext-role-text">${ext.role}</p>
    </section>` : '';

  const summaryBlock = (ext && ext.summary && ext.summary.length) ? `
    <details class="ext-details">
      <summary><span class="ext-summary-icon">✨</span> 요약 설명 <span class="ext-count">(${ext.summary.length}줄)</span></summary>
      <ul class="ext-list">${ext.summary.map(s => `<li>${s}</li>`).join('')}</ul>
    </details>` : '';

  const jobsBlock = (ext && ext.jobs && ext.jobs.length) ? `
    <details class="ext-details">
      <summary><span class="ext-summary-icon">💼</span> 직업 / 전문사역 TOP ${ext.jobs.length} <span class="ext-count">(접어두기 · 펼쳐 보기)</span></summary>
      <ol class="ext-list ext-list-ol">${ext.jobs.map(j => `<li>${j}</li>`).join('')}</ol>
    </details>` : '';

  const hashtagsBlock = (ext && ext.hashtags && ext.hashtags.length) ? `
    <div class="ext-hashtags">${ext.hashtags.map(h => `<span class="ext-hashtag">${h}</span>`).join('')}</div>` : '';

  const areaBlock = (ext && ext.area) ? `
    <div class="ext-area">은사영역 · ${ext.area}</div>` : '';

  $('#top3').innerHTML = `
    <article class="rounded-xl p-6 sm:p-8 shadow-lg text-center">
      <div class="text-sm font-bold mb-2 tracking-widest" style="color:#67e8f9">
        MY TALENT ARCHETYPE (${top3[0].key}+${top3[1].key}+${top3[2].key} 조합)
      </div>
      <h5 class="text-3xl sm:text-4xl font-extrabold">
        ${combo.title}
      </h5>
      ${areaBlock}
      <p class="mt-4 text-lg leading-relaxed font-medium">
        ${combo.desc}
      </p>

      ${personaBlock}
      ${callingBlock}
      ${verseBlock}
      ${roleBlock}

      <div class="mt-6 pt-6 text-left" style="border-top:1px solid rgba(148,163,184,.18)">
        <h5 class="text-xl font-bold mb-4">
          ⛪ 현실적인 교회 현장 사역 TOP ${ministryItems.length}
        </h5>
        <ul class="list-decimal list-inside text-left space-y-2 pl-4">
          ${examplesList}
        </ul>
      </div>

      ${summaryBlock}
      ${jobsBlock}
      ${hashtagsBlock}

      <p class="mt-8 text-sm font-semibold pt-4" style="border-top:1px solid rgba(148,163,184,.18); color:#f0bc78">
        [신학적 권면] 본 검사는 선생님께서 만드신 기독교교육학적 탐색 도구로서, 은사 조합은 사역의 방향성을 제시할 뿐입니다. 이 결과를 말씀과 기도 안에서 깊이 분별하고, 성령의 구체적인 부르심을 따라 목회적/신학적 지도 안에서 사역의 확신을 세우시기를 권장합니다.
      </p>

    </article>
  `;

  const tbl = $('#score-table'); tbl.innerHTML='';
  scores.forEach((s, idx)=>{
    const rank = idx + 1;
    const isTop = rank <= 3;
    const badge = isTop
      ? `<span class="score-badge ml-2 shrink-0 inline-flex items-center justify-center text-xs px-2 py-0.5 rounded-full font-semibold">TOP ${rank}</span>`
      : '';
    const scoreColor = isTop ? 'text-lg font-extrabold' : 'font-semibold';

    tbl.insertAdjacentHTML('beforeend',
      `<div class="px-4 py-3 rounded-xl flex items-center justify-between min-w-0">
         <span class="flex items-center whitespace-nowrap min-w-0">
           <b class="shrink-0">${s.key}</b><span class="mx-1 text-slate-500">|</span>
           <span class="truncate font-medium">${s.name}</span>${badge}
         </span>
         <span class="${scoreColor} shrink-0 ml-3">${s.norm}</span>
       </div>`);
  });
}

/* ===== 데이터 저장 ===== */
async function saveToSheets(payload){
  try{
    await fetch(WEB_APP_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    });
  }catch(e){ console.error('시트 저장 실패:', e); }
}

/* ===== 네비게이션 ===== */
async function next(){
  // 이미 제출 중이면 중복 실행 방지
  if(submitting) return;
  
  const sel = document.querySelector(`input[name="q${state.i}"]:checked`);
  if(!sel){ alert('답변을 선택해야 다음으로 넘어갈 수 있습니다.'); return; }

  state.rt[state.i] = Math.round(performance.now() - qStart);
  state.answers[state.i] = Number(sel.value);

  if(state.i >= QUESTIONS.length-1){
    // 제출 시작 - UI 잠금
    submitting = true;
    lockNav(true);
    
    // 제출 버튼 텍스트 변경 및 로딩 표시
    const submitBtn = $('#btn-next');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = '제출 중...';
    submitBtn.classList.add('btn-disabled');
    
    try {
      const scores = calcScores();
      const payload = {
        timestamp: new Date().toISOString(),
        instrumentVersion: 'std60_youth_v1_design_v3',
        user: { name: state.name, gender: state.gender, ageGroup: state.age, region: state.region },
        answers: state.answers,
        rt_ms: state.rt,
        scoresRaw: scores.reduce((o,s)=> (o[s.key]=s.sum, o), {}),
        scoresNorm: scores.reduce((o,s)=> (o[s.key]=s.norm, o), {}),
        top: scores.slice(0,3).map(s=>({type:s.key, name:s.name, norm:s.norm}))
      };
      await saveToSheets(payload);
      showResult();
    } catch (error) {
      console.error('제출 실패:', error);
      alert('제출 중 오류가 발생했습니다. 다시 시도해 주세요.');
      // 오류 시 UI 복원
      submitting = false;
      lockNav(false);
      submitBtn.textContent = originalText;
      submitBtn.classList.remove('btn-disabled');
    }
  } else {
    state.i++; renderQuestion();
  }
}
function prev(){ if(submitting) return; if(state.i>0){ state.i--; renderQuestion(); } }
</script>
